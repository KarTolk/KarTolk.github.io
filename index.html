<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio</title>

<!-- PRELOAD IMAGES -->
<link rel="preload" as="image" href="PHOTO_300x400.jpg">
<link rel="preload" as="image" href="PROJECT1.jpg">
<link rel="preload" as="image" href="PROJECT2.jpg">
<link rel="preload" as="image" href="PROJECT3.jpg">
<link rel="preload" as="image" href="PROJECT4.jpg">

<style>
:root{
  --bg:#f6f7fb;
  --text:#1b1f2a;
  --muted:#6b7280;
  --accent:#4f7cff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:var(--bg);
  color:var(--text);
  cursor:none;
}

/* ===== CUSTOM CURSOR ===== */
.cursor{
  width:12px;
  height:12px;
  border-radius:50%;
  background:var(--accent);
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:9999;
  transition:transform .08s ease;
}

/* ===== NAV ===== */
nav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:center;
  gap:30px;
  padding:15px;
  z-index:1000;
}

nav a{
  text-decoration:none;
  color:var(--text);
  font-size:14px;
  transition:.3s;
}

nav a:hover{
  color:var(--accent);
}

/* ===== SECTIONS ===== */
section{
  padding:100px 10%;
}

h2{margin-bottom:20px}

/* ===== ABOUT ===== */
.about{
  display:flex;
  gap:40px;
  align-items:center;
  justify-content:space-between;
}

.photo{
  width:300px;
  height:400px;
  overflow:hidden;
  border-radius:18px;
}

.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== EXPERIENCE ===== */
.card{
  background:white;
  padding:20px;
  border-radius:16px;
  margin-bottom:15px;
}

/* ===== PROJECTS ===== */
.projects{
  display:flex;
  gap:20px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  padding-bottom:10px;
}

.project{
  min-width:547px;
  height:500px;
  position:relative;
  cursor:pointer;
  scroll-snap-align:start;
}

/* ❌ НЕТ ТЕНЕЙ И ОБВОДОК */
.project img{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  transition:.4s ease;
}

.project img.hover{opacity:0}
.project:hover img.hover{opacity:1}
.project:hover img.main{opacity:0}

/* ===== CASE VIEW ===== */
.case{
  margin-top:30px;
  padding:25px;
  background:white;
  border-radius:18px;
  opacity:0;
  transform:translateY(20px);
  transition:.4s;
}

.case.active{
  opacity:1;
  transform:translateY(0);
}

/* ===== TOP BUTTON ===== */
#topBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  cursor:pointer;
  display:none;
}

/* MOBILE */
@media(max-width:768px){
  .about{flex-direction:column}
  .project{min-width:85%}
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<!-- AUDIO -->
<audio id="clickSound">
  <!-- 🎧 ВСТАВЬ СЮДА ФАЙЛ ЗВУКА -->
  <source src="CLICK_SOUND.mp3" type="audio/mpeg">
</audio>

<!-- NAV -->
<nav>
  <a href="#about">Обо мне</a>
  <a href="#exp">Опыт</a>
  <a href="#projects">Кейсы</a>
</nav>

<!-- ABOUT -->
<section id="about">
  <h2>Обо мне</h2>

  <div class="about">

    <div>
      <h1>Андриянова Екатерина</h1>
      <p>RUS / ENG (C1+)</p>
      <p>Санкт-Петербург</p>
      <p>famm22@yandex.ru | tg: katt_an</p>
      <p>Графический и продуктовый дизайнер</p>
      <p>
        Я дизайнер с 1+ годом опыта в B2B продуктах...
      </p>
    </div>

    <div class="photo">
      <img src="PHOTO_300x400.jpg" />
    </div>

  </div>
</section>

<!-- EXPERIENCE -->
<section id="exp">
  <h2>Опыт</h2>

  <div class="card">
    <h3>ЗАГОЛОВОК</h3>
    <p>Подзаголовок</p>
    <p>Текст опыта</p>
  </div>

</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Кейсы</h2>

  <div class="projects">

    <div class="project" onclick="openCase(1); playSound()">
      <img class="main" src="PROJECT1.jpg">
      <img class="hover" src="PROJECT1_HOVER.jpg">
    </div>

    <div class="project" onclick="openCase(2); playSound()">
      <img class="main" src="PROJECT2.jpg">
      <img class="hover" src="PROJECT2_HOVER.jpg">
    </div>

    <div class="project" onclick="openCase(3); playSound()">
      <img class="main" src="PROJECT3.jpg">
      <img class="hover" src="PROJECT3_HOVER.jpg">
    </div>

    <div class="project" onclick="openCase(4); playSound()">
      <img class="main" src="PROJECT4.jpg">
      <img class="hover" src="PROJECT4_HOVER.jpg">
    </div>

  </div>

  <div class="case" id="caseBox">
    <h2 id="ct">Заголовок</h2>
    <p id="cs">Подзаголовок</p>
    <p id="cx">Текст кейса</p>
  </div>
</section>

<!-- TOP BUTTON -->
<button id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">
↑ Наверх
</button>

<script>

/* ===== CURSOR ===== */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* ===== CASE DATA ===== */
const cases = {
  1:{t:"Кейс 1", s:"Подзаголовок 1", x:"Текст кейса 1"},
  2:{t:"Кейс 2", s:"Подзаголовок 2", x:"Текст кейса 2"},
  3:{t:"Кейс 3", s:"Подзаголовок 3", x:"Текст кейса 3"},
  4:{t:"Кейс 4", s:"Подзаголовок 4", x:"Текст кейса 4"},
};

function openCase(i){
  document.getElementById("ct").innerText = cases[i].t;
  document.getElementById("cs").innerText = cases[i].s;
  document.getElementById("cx").innerText = cases[i].x;

  document.getElementById("caseBox").classList.add("active");
}

/* ===== SOUND ===== */
function playSound(){
  const s = document.getElementById("clickSound");
  s.currentTime = 0;
  s.play();
}

/* ===== TOP BUTTON ===== */
const btn = document.getElementById("topBtn");

window.addEventListener("scroll", ()=>{
  if(window.scrollY > 600){
    btn.style.display = "block";
  } else {
    btn.style.display = "none";
  }
});

</script>

</body>
</html>
